version: "3.9"

services:
  api:
    image: aryu_api:latest
    container_name: aryu_api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aryu_network
    deploy:
      resources:
        limits:
          memory: 4g

networks:
  aryu_network:
    driver: bridge