services:

  api:
    build: .
    image: sivaarun10/aryu_api:latest
    container_name: aryu_api
    restart: always
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma4:31b-cloud
      OLLAMA_TIMEOUT: "120"
    ports:
      - "8000:8000"
    networks:
      - aryu_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  aryu_network:
    driver: bridge